<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectShobdo | Open Bengali Dictionary</title>
    <link rel="icon" type="image/x-icon" href="assets/Favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans:  ['"Hind Siliguri"', 'sans-serif'],
                        serif: ['"Libre Baskerville"', 'Georgia', 'serif'],
                        mono:  ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; }

        body {
            background: #f7f5f2;
            color: #1a1625;
            min-height: 100vh;
            font-family: 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .dark body { background: #100e1a; color: #e8e3f4; }

        ::selection { background: #7c3aed; color: #fff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7c3aed44; border-radius: 99px; }

        /* Shell */
        .shell {
            display: grid;
            grid-template-columns: 230px 1fr;
            min-height: 100vh;
        }
        @media (max-width: 860px) {
            .shell { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .mobile-bar { display: flex !important; }
        }

        /* Sidebar */
        .sidebar {
            border-right: 1px solid #ddd8d0;
            padding: 1.75rem 1.375rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .dark .sidebar { border-color: #221e36; }

        .logo-block { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.75rem; }
        .logo-block img { height: 26px; object-fit: contain; }
        .logo-name {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8125rem;
            font-weight: 700;
            color: #7c3aed;
            line-height: 1.1;
        }
        .logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.52rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #8a82a0;
            margin-top: 2px;
        }

        .rule { border: none; border-top: 1px solid #ddd8d0; margin: 1rem 0; }
        .dark .rule { border-color: #221e36; }

        .sidebar-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.575rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8a82a0;
            margin-bottom: 0.5rem;
        }

        .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.15rem 0; }
        .stat-name { font-size: 0.8rem; color: #3d3552; text-transform: capitalize; }
        .dark .stat-name { color: #b8b0d0; }
        .stat-val { font-family: 'DM Mono', monospace; font-size: 0.725rem; color: #7c3aed; }
        .dark .stat-val { color: #a78bfa; }

        .letter-grid { display: flex; flex-wrap: wrap; gap: 3px; }
        .letter-btn {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #ddd8d0;
            border-radius: 3px;
            color: #3d3552;
            background: transparent;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .dark .letter-btn { border-color: #2a2540; color: #b8b0d0; }
        .letter-btn:hover { background: #7c3aed; border-color: #7c3aed; color: #fff; }

        .sidebar-links { margin-top: auto; display: flex; flex-direction: column; gap: 0.125rem; }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem;
            color: #8a82a0;
            text-decoration: none;
            padding: 0.3rem 0.25rem;
            border-radius: 4px;
            transition: color 0.15s;
        }
        .sidebar-link:hover { color: #7c3aed; }

        .sidebar-foot {
            margin-top: 1.25rem;
            padding-top: 0.875rem;
            border-top: 1px solid #ddd8d0;
        }
        .dark .sidebar-foot { border-color: #221e36; }
        .sidebar-foot p { font-family: 'DM Mono', monospace; font-size: 0.575rem; color: #c8c3d8; line-height: 1.9; }
        .dark .sidebar-foot p { color: #3a3255; }

        /* Mobile top bar */
        .mobile-bar {
            display: none;
            align-items: center;
            gap: 0.625rem;
            padding: 0.625rem 1rem;
            border-bottom: 1px solid #ddd8d0;
            background: #f7f5f2;
        }
        .dark .mobile-bar { background: #100e1a; border-color: #221e36; }
        .mobile-bar img { height: 22px; object-fit: contain; }
        .mobile-bar-name { font-family: 'Libre Baskerville', serif; font-size: 0.8125rem; font-weight: 700; color: #7c3aed; }

        /* Right column */
        .right-col { display: flex; flex-direction: column; min-width: 0; }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #f7f5f2;
            border-bottom: 1px solid #ddd8d0;
        }
        .dark .topbar { background: #100e1a; border-color: #221e36; }

        .search-row {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.8rem 1.75rem;
        }
        @media (max-width: 600px) { .search-row { padding: 0.75rem 1rem; } }

        .search-icon { font-size: 1rem; color: #8a82a0; flex-shrink: 0; }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 1rem;
            color: #1a1625;
            font-weight: 500;
            min-width: 0;
        }
        .dark .search-input { color: #e8e3f4; }
        .search-input::placeholder { color: #8a82a0; font-weight: 400; }

        .meta-strip {
            padding: 0.3rem 1.75rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: #8a82a0;
            letter-spacing: 0.02em;
            border-bottom: 1px solid #ddd8d0;
            min-height: 26px;
            display: flex;
            align-items: center;
        }
        .dark .meta-strip { border-color: #221e36; }
        @media (max-width: 600px) { .meta-strip { padding-left: 1rem; padding-right: 1rem; } }

        .icon-btn {
            background: transparent;
            border: 1px solid #ddd8d0;
            border-radius: 5px;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #8a82a0;
            flex-shrink: 0;
            transition: border-color 0.15s, color 0.15s;
            font-size: 0.875rem;
        }
        .dark .icon-btn { border-color: #2a2540; }
        .icon-btn:hover { border-color: #7c3aed; color: #7c3aed; }

        /* Content */
        .content { padding: 0 1.75rem 4rem; flex: 1; }
        @media (max-width: 600px) { .content { padding: 0 1rem 3rem; } }

        /* Word grid — newspaper columns */
        .word-grid {
            column-count: 2;
            column-gap: 0;
            column-fill: balance;
        }
        @media (max-width: 680px) { .word-grid { column-count: 1; } }

        /* Word card */
        .word-card {
            break-inside: avoid;
            padding: 1.25rem 0;
            border-bottom: 1px solid #ddd8d0;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            opacity: 0;
            position: relative;
            transition: background 0.15s;
        }
        .dark .word-card { border-color: #221e36; }
        .word-card.show { animation: fadeSlide 0.3s ease-out forwards; }

        /* Column gutters: odd cards get right padding, even get left padding + left border */
        .word-grid .word-card:nth-child(odd)  { padding-right: 1.5rem; }
        .word-grid .word-card:nth-child(even) { padding-left: 1.5rem; border-left: 1px solid #ddd8d0; }
        .dark .word-grid .word-card:nth-child(even) { border-left-color: #221e36; }

        /* Hover accent bar */
        .word-card::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: #7c3aed;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .word-grid .word-card:nth-child(odd)::after  { left: -1px; }
        .word-grid .word-card:nth-child(even)::after { left: -1px; }
        .word-card:hover::after { opacity: 1; }

        /* Card content */
        .card-head { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }

        .card-word {
            font-family: 'Libre Baskerville', serif;
            font-size: 1.3125rem;
            font-weight: 700;
            color: #1a1625;
            line-height: 1.2;
            letter-spacing: -0.015em;
        }
        .dark .card-word { color: #e8e3f4; }

        .card-pos {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #7c3aed;
            border: 1px solid #c4b5fd60;
            border-radius: 3px;
            padding: 2px 5px;
            line-height: 1.5;
            white-space: nowrap;
            align-self: center;
        }
        .dark .card-pos { color: #a78bfa; border-color: #4c1d9560; }

        .card-meanings { list-style: none; padding: 0; }
        .card-meanings li {
            font-size: 0.9rem;
            color: #3d3552;
            line-height: 1.55;
            padding-left: 0.8rem;
            position: relative;
        }
        .dark .card-meanings li { color: #b8b0d0; }
        .card-meanings li::before { content: '–'; position: absolute; left: 0; color: #8a82a0; }

        .card-eng {
            font-size: 0.78rem;
            color: #8a82a0;
            font-style: italic;
            margin-top: 0.125rem;
        }

        .card-ex {
            font-size: 0.775rem;
            color: #8a82a0;
            line-height: 1.6;
            border-left: 2px solid #ddd8d0;
            padding-left: 0.5rem;
            margin-top: 0.125rem;
        }
        .dark .card-ex { border-color: #2a2540; color: #6a6382; }

        /* Skeleton */
        @keyframes shimmer {
            0%   { background-position: -500px 0; }
            100% { background-position: 500px 0; }
        }
        .skel {
            border-radius: 3px;
            background: linear-gradient(90deg, #eeeae3 30%, #ddd8d0 50%, #eeeae3 70%);
            background-size: 1000px 100%;
            animation: shimmer 1.2s infinite linear;
        }
        .dark .skel {
            background: linear-gradient(90deg, #1e1a30 30%, #2a2540 50%, #1e1a30 70%);
            background-size: 1000px 100%;
        }

        /* Empty state */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            gap: 0.625rem;
        }
        .empty-state.show { display: flex; }
        .empty-icon {
            width: 42px; height: 42px;
            border: 1px solid #ddd8d0;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            color: #8a82a0;
            margin-bottom: 0.375rem;
        }
        .dark .empty-icon { border-color: #2a2540; }
        .empty-state h3 { font-family: 'Libre Baskerville', serif; font-size: 1rem; color: #3d3552; }
        .dark .empty-state h3 { color: #b8b0d0; }
        .empty-state p { font-size: 0.825rem; color: #8a82a0; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(7px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.75s linear infinite; }
    </style>
</head>

<body>
<div class="shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-block">
            <img src="assets/LOGO.png" alt="ProjectShobdo">
            <div>
                <div class="logo-name">ProjectShobdo</div>
                <div class="logo-sub">Bengali Lexicon</div>
            </div>
        </div>

        <hr class="rule">
        <div id="sidebarStats">
            <div class="sidebar-label">Corpus</div>
            <div class="skel" style="height:13px;width:55%;margin-bottom:5px;"></div>
            <div class="skel" style="height:11px;width:40%;margin-bottom:5px;"></div>
            <div class="skel" style="height:11px;width:48%;"></div>
        </div>

        <hr class="rule">
        <div id="sidebarNav">
            <div class="sidebar-label">Browse</div>
            <div class="letter-grid" id="letterGrid"></div>
        </div>

        <hr class="rule">
        <nav class="sidebar-links">
            <a href="https://github.com/InanXR/ProjectShobdo" target="_blank" class="sidebar-link">
                <i class="ph ph-github-logo"></i> GitHub
            </a>
            <a href="dist/json/dictionary.min.json" class="sidebar-link">
                <i class="ph ph-database"></i> JSON Data
            </a>
        </nav>

        <div class="sidebar-foot">
            <p>© 2025 ProjectShobdo</p>
            <p>Apache License, Version 2.0</p>
        </div>
    </aside>

    <!-- RIGHT COLUMN -->
    <div class="right-col">

        <!-- Mobile bar -->
        <div class="mobile-bar">
            <img src="assets/LOGO.png" alt="">
            <span class="mobile-bar-name">ProjectShobdo</span>
            <button class="icon-btn" id="themeBtnMobile" style="margin-left:auto;">
                <i class="ph ph-sun" id="sunM"></i><i class="ph ph-moon" id="moonM" style="display:none;"></i>
            </button>
        </div>

        <!-- Sticky topbar -->
        <div class="topbar">
            <div class="search-row">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input id="searchInput" type="text" class="search-input"
                       placeholder="শব্দ খুঁজুন…  search Bengali or English"
                       autocomplete="off" spellcheck="false" disabled>
                <i class="ph ph-spinner-gap spin" id="loadingSpinner" style="color:#7c3aed;font-size:1rem;flex-shrink:0;"></i>
                <button id="clearBtn" class="icon-btn" style="display:none;" title="Clear">
                    <i class="ph ph-x"></i>
                </button>
                <button class="icon-btn" id="themeBtn" title="Toggle theme">
                    <i class="ph ph-sun" id="sunD"></i><i class="ph ph-moon" id="moonD" style="display:none;"></i>
                </button>
            </div>
            <div class="meta-strip"><span id="metaText"></span></div>
        </div>

        <!-- Cards -->
        <div class="content">
            <div class="word-grid" id="results"></div>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon"><i class="ph ph-magnifying-glass" style="font-size:1.125rem;"></i></div>
                <h3 id="emptyTitle">কোনো ফলাফল পাওয়া যায়নি</h3>
                <p id="emptyDesc">No results — try a different spelling</p>
            </div>
        </div>
    </div>

</div>

<script>
    /* Theme */
    const html = document.documentElement;
    const icons = {
        sun: [document.getElementById('sunD'), document.getElementById('sunM')],
        moon:[document.getElementById('moonD'),document.getElementById('moonM')],
    };

    function applyTheme() {
        const dark = localStorage.theme === 'dark' ||
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        html.classList.toggle('dark', dark);
        icons.sun.forEach(el  => el.style.display = dark ? 'none' : 'block');
        icons.moon.forEach(el => el.style.display = dark ? 'block' : 'none');
    }
    applyTheme();

    function toggleTheme() {
        html.classList.toggle('dark');
        localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        applyTheme();
    }
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    document.getElementById('themeBtnMobile').addEventListener('click', toggleTheme);

    /* Data */
    let dict = [];
    const searchEl  = document.getElementById('searchInput');
    const resultsEl = document.getElementById('results');
    const spinner   = document.getElementById('loadingSpinner');
    const emptyEl   = document.getElementById('emptyState');
    const metaEl    = document.getElementById('metaText');
    const clearBtn  = document.getElementById('clearBtn');

    fetch('dist/json/dictionary.min.json')
        .then(r => r.json())
        .then(data => {
            dict = data;
            spinner.style.display = 'none';
            searchEl.disabled = false;
            searchEl.focus();
            buildStats();
            buildLetters();
            showRandom();
        })
        .catch(() => {
            spinner.style.display = 'none';
            searchEl.placeholder = 'Failed to load dictionary.';
        });

    searchEl.addEventListener('input', e => {
        const q = e.target.value.trim().toLowerCase();
        clearBtn.style.display = q ? 'flex' : 'none';
        if (!q) { showRandom(); return; }
        const res = dict.filter(en =>
            en.word.toLowerCase().includes(q) ||
            (en.english_translation || '').toLowerCase().includes(q)
        ).slice(0, 60);
        render(res, `${res.length} result${res.length !== 1 ? 's' : ''} for "${e.target.value.trim()}"`);
    });

    clearBtn.addEventListener('click', () => {
        searchEl.value = '';
        clearBtn.style.display = 'none';
        searchEl.focus();
        showRandom();
    });

    function render(entries, meta) {
        metaEl.textContent = meta || '';
        if (!entries.length) {
            resultsEl.innerHTML = '';
            emptyEl.classList.add('show');
            return;
        }
        emptyEl.classList.remove('show');
        resultsEl.innerHTML = entries.map((en, i) => `
            <div class="word-card" style="animation-delay:${Math.min(i*28,400)}ms">
                <div class="card-head">
                    <span class="card-word">${en.word}</span>
                    <span class="card-pos">${en.part_of_speech}</span>
                </div>
                <ul class="card-meanings">
                    ${en.meanings.map(m => `<li>${m}</li>`).join('')}
                </ul>
                ${en.english_translation ? `<div class="card-eng">${en.english_translation}</div>` : ''}
                ${en.examples?.length ? `<div class="card-ex">${en.examples[0]}</div>` : ''}
            </div>
        `).join('');

        const cards = resultsEl.querySelectorAll('.word-card');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });

        cards.forEach((c, i) => {
            setTimeout(() => observer.observe(c), Math.min(i * 28, 400));
        });
    }

    function showRandom() {
        if (!dict.length) return;
        const sample = Array.from({ length: 24 }, () => dict[Math.floor(Math.random() * dict.length)]);
        render(sample, 'Random entries — start typing to search');
    }

    function buildStats() {
        const posMap = {};
        dict.forEach(e => { posMap[e.part_of_speech] = (posMap[e.part_of_speech] || 0) + 1; });
        const top = Object.entries(posMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
        document.getElementById('sidebarStats').innerHTML = `
            <div class="sidebar-label">Corpus</div>
            <div class="stat-row">
                <span class="stat-name">Total words</span>
                <span class="stat-val">${dict.length.toLocaleString()}</span>
            </div>
            <hr class="rule" style="margin:0.6rem 0;">
            <div class="sidebar-label">Parts of speech</div>
            ${top.map(([p,n]) => `
                <div class="stat-row">
                    <span class="stat-name">${p}</span>
                    <span class="stat-val">${n.toLocaleString()}</span>
                </div>
            `).join('')}
        `;
    }

    function buildLetters() {
        const letters = [...new Set(dict.map(e => e.word.charAt(0)))].slice(0,40);
        document.getElementById('letterGrid').innerHTML = letters.map(l =>
            `<button class="letter-btn" onclick="filterL('${l}')">${l}</button>`
        ).join('');
    }

    function filterL(l) {
        searchEl.value = l;
        clearBtn.style.display = 'flex';
        const res = dict.filter(e => e.word.startsWith(l)).slice(0,60);
        render(res, `${res.length} words starting with "${l}"`);
    }
</script>
</body>
</html>
