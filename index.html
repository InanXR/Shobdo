<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectShobdo | Open Bengali Dictionary</title>
    <meta name="description" content="ProjectShobdo — an open-source Bengali dictionary and lexical corpus with 50,000+ words.">
    <link rel="icon" type="image/x-icon" href="assets/Favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Hind Siliguri"', '"Inter"', 'sans-serif'],
                        latin: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#7c3aed',
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        },
                        surface: {
                            light: '#ffffff',
                            dark: '#1e293b',
                        },
                        sidebar: {
                            light: '#1e293b',
                            dark: '#0f172a',
                        }
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.4s ease-out forwards',
                        'slide-in-right': 'slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-out-right': 'slideOutRight 0.25s ease-in forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'count-up': 'fadeUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(24px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        slideOutRight: {
                            '0%': { opacity: '1', transform: 'translateX(0)' },
                            '100%': { opacity: '0', transform: 'translateX(24px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 8px rgba(124,58,237,0.15)' },
                            '50%': { boxShadow: '0 0 20px rgba(124,58,237,0.3)' },
                        },
                    }
                }
            }
        }
    </script>

    <style>
        /* ===== GLOBAL ===== */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.25); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(124,58,237,0.5); }

        /* ===== APP SHELL ===== */
        #app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        #sidebar {
            width: 72px;
            min-width: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 4px;
            z-index: 50;
            transition: background-color 0.3s;
        }
        .sidebar-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 22px;
            position: relative;
        }
        .sidebar-btn:hover {
            background: rgba(124,58,237,0.1);
            color: #a78bfa;
        }
        .sidebar-btn.active {
            background: rgba(124,58,237,0.15);
            color: #a78bfa;
        }
        .sidebar-btn.active::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: #7c3aed;
            border-radius: 0 3px 3px 0;
        }
        .sidebar-spacer { flex: 1; }
        .sidebar-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: contain;
            margin-bottom: 16px;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .sidebar-logo:hover { opacity: 1; }
        .sidebar-divider {
            width: 28px;
            height: 1px;
            background: rgba(148,163,184,0.15);
            margin: 8px 0;
        }

        /* ===== MAIN CONTENT ===== */
        #mainContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        /* ===== LANDING VIEW ===== */
        #landingView {
            display: flex;
            height: 100%;
        }
        .landing-brand {
            width: 42%;
            min-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            position: relative;
            overflow: hidden;
        }
        .landing-brand::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 40%, #0f172a 100%);
            z-index: 0;
        }
        .landing-brand > * { position: relative; z-index: 1; }
        .landing-brand .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }
        .landing-brand .orb-1 {
            width: 300px; height: 300px;
            background: #7c3aed;
            top: -60px; left: -60px;
        }
        .landing-brand .orb-2 {
            width: 200px; height: 200px;
            background: #3b82f6;
            bottom: 10%; right: -40px;
        }

        .landing-search {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        /* ===== SEARCH BAR ===== */
        .search-container {
            width: 100%;
            max-width: 580px;
            position: relative;
        }
        .search-bar {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            transition: all 0.25s;
        }
        .dark .search-bar {
            border-color: #334155;
            background: #1e293b;
        }
        .search-bar:focus-within {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .dark .search-bar:focus-within {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 18px;
            font-family: 'Hind Siliguri', sans-serif;
            color: #0f172a;
            font-weight: 500;
        }
        .dark .search-bar input { color: #f1f5f9; }
        .search-bar input::placeholder { color: #94a3b8; font-weight: 400; }
        .dark .search-bar input::placeholder { color: #64748b; }
        .search-bar .search-icon { color: #94a3b8; font-size: 22px; flex-shrink: 0; transition: color 0.2s; }
        .search-bar:focus-within .search-icon { color: #7c3aed; }
        .dark .search-bar:focus-within .search-icon { color: #a78bfa; }
        .search-kbd {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 7px;
            border-radius: 6px;
            background: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
            line-height: 1;
            flex-shrink: 0;
        }
        .dark .search-kbd { background: #0f172a; border-color: #334155; color: #64748b; }

        /* ===== SUGGESTION PILLS ===== */
        .suggestion-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
            justify-content: center;
        }
        .pill {
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #e2e8f0;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Hind Siliguri', sans-serif;
        }
        .dark .pill { border-color: #334155; color: #94a3b8; }
        .pill:hover {
            border-color: #7c3aed;
            color: #7c3aed;
            background: #f5f3ff;
        }
        .dark .pill:hover {
            border-color: #a78bfa;
            color: #a78bfa;
            background: rgba(124,58,237,0.1);
        }

        /* ===== STAT CHIPS ===== */
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stat-chip i { color: #a78bfa; font-size: 16px; }

        /* ===== RESULTS VIEW ===== */
        #resultsView {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .results-header {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .dark .results-header { border-color: #1e293b; }
        .results-header .back-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; border: none;
            background: transparent; color: #64748b;
            cursor: pointer; font-size: 20px;
            transition: all 0.2s;
        }
        .results-header .back-btn:hover { background: #f1f5f9; color: #7c3aed; }
        .dark .results-header .back-btn:hover { background: #1e293b; color: #a78bfa; }

        .results-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== RESULTS LIST (left panel) ===== */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            min-width: 0;
        }
        .results-list.has-detail {
            max-width: 420px;
            min-width: 320px;
            border-right: 1px solid #e2e8f0;
        }
        .dark .results-list.has-detail { border-color: #1e293b; }

        .result-row {
            display: flex;
            align-items: center;
            padding: 14px 32px;
            gap: 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .result-row:hover {
            background: #f8fafc;
        }
        .dark .result-row:hover { background: rgba(30,41,59,0.5); }
        .result-row.active {
            background: #f5f3ff;
            border-left-color: #7c3aed;
        }
        .dark .result-row.active {
            background: rgba(124,58,237,0.08);
            border-left-color: #a78bfa;
        }
        .result-row .rr-word {
            font-size: 22px;
            font-weight: 700;
            color: #7c3aed;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dark .result-row .rr-word { color: #a78bfa; }
        .result-row .rr-pos {
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 3px 10px;
            border-radius: 99px;
            background: #f5f3ff;
            color: #7c3aed;
            border: 1px solid #ede9fe;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .dark .result-row .rr-pos {
            background: rgba(124,58,237,0.1);
            color: #a78bfa;
            border-color: rgba(124,58,237,0.2);
        }
        .result-row .rr-meaning {
            flex: 1;
            font-size: 15px;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .dark .result-row .rr-meaning { color: #94a3b8; }
        .result-row .rr-arrow { color: #cbd5e1; font-size: 18px; flex-shrink: 0; transition: color 0.2s; }
        .result-row:hover .rr-arrow { color: #7c3aed; }
        .dark .result-row .rr-arrow { color: #475569; }
        .dark .result-row:hover .rr-arrow { color: #a78bfa; }

        /* ===== DETAIL PANEL (right panel) ===== */
        .detail-panel {
            flex: 1.5;
            overflow-y: auto;
            padding: 40px 48px;
            display: none;
            min-width: 0;
        }
        .detail-panel.open { display: block; }

        .detail-word {
            font-size: 48px;
            font-weight: 700;
            color: #7c3aed;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .dark .detail-word { color: #a78bfa; }

        .detail-pos {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 5px 14px;
            border-radius: 99px;
            background: #f5f3ff;
            color: #7c3aed;
            border: 1px solid #ede9fe;
            margin-bottom: 24px;
        }
        .dark .detail-pos {
            background: rgba(124,58,237,0.1);
            color: #a78bfa;
            border-color: rgba(124,58,237,0.2);
        }

        .detail-divider {
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }
        .dark .detail-divider { background: #1e293b; }

        .detail-section-title {
            font-size: 11px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dark .detail-section-title { color: #64748b; }

        .meaning-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            font-size: 18px;
            color: #334155;
            line-height: 1.6;
        }
        .dark .meaning-item { color: #e2e8f0; }
        .meaning-num {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: #7c3aed;
            min-width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #f5f3ff;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .dark .meaning-num { background: rgba(124,58,237,0.1); color: #a78bfa; }

        .detail-english {
            font-size: 16px;
            color: #475569;
            line-height: 1.7;
        }
        .dark .detail-english { color: #94a3b8; }

        .detail-example-box {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 8px;
        }
        .dark .detail-example-box {
            background: rgba(15,23,42,0.5);
            border-color: #1e293b;
        }
        .detail-example-box p {
            font-size: 15px;
            color: #64748b;
            font-style: italic;
            line-height: 1.7;
        }
        .dark .detail-example-box p { color: #94a3b8; }
        .detail-example-box .quote-mark {
            font-size: 28px;
            color: #ddd6fe;
            font-family: Georgia, serif;
            line-height: 1;
        }
        .dark .detail-example-box .quote-mark { color: #4c1d95; }

        .related-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .related-pill {
            padding: 5px 14px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #ede9fe;
            background: transparent;
            color: #7c3aed;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dark .related-pill { border-color: rgba(124,58,237,0.2); color: #a78bfa; }
        .related-pill:hover {
            background: #f5f3ff;
            border-color: #7c3aed;
        }
        .dark .related-pill:hover { background: rgba(124,58,237,0.1); }

        /* ===== BOOKMARK ICON ===== */
        .bookmark-btn {
            background: none; border: none; cursor: pointer;
            font-size: 24px; color: #cbd5e1;
            transition: all 0.2s; padding: 4px;
        }
        .dark .bookmark-btn { color: #475569; }
        .bookmark-btn:hover { color: #7c3aed; transform: scale(1.1); }
        .bookmark-btn.bookmarked { color: #7c3aed; }
        .dark .bookmark-btn.bookmarked { color: #a78bfa; }

        /* ===== BOOKMARKS VIEW ===== */
        #bookmarksView {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* ===== RESULTS COUNT ===== */
        .results-count {
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            color: #94a3b8;
            font-weight: 500;
            padding: 0 32px 8px;
            flex-shrink: 0;
        }
        .dark .results-count { color: #64748b; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 32px;
            text-align: center;
            flex: 1;
        }
        .empty-icon {
            width: 72px; height: 72px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px;
            background: #f5f3ff;
            color: #7c3aed;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .dark .empty-icon { background: rgba(124,58,237,0.1); color: #a78bfa; }
        .empty-state h3 {
            font-size: 22px; font-weight: 700;
            color: #334155; margin-bottom: 8px;
        }
        .dark .empty-state h3 { color: #e2e8f0; }
        .empty-state p { font-size: 15px; color: #94a3b8; }
        .dark .empty-state p { color: #64748b; }

        /* ===== LOADING SKELETON ===== */
        .skeleton-row {
            display: flex; gap: 16px; align-items: center;
            padding: 16px 32px;
        }
        .skeleton-block {
            height: 20px; border-radius: 6px;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        .dark .skeleton-block {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ===== FOOTER ===== */
        .app-footer {
            padding: 12px 32px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .dark .app-footer { border-color: #1e293b; color: #475569; }
        .app-footer a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .dark .app-footer a { color: #475569; }
        .app-footer a:hover { color: #7c3aed; }
        .dark .app-footer a:hover { color: #a78bfa; }

        /* ===== MOBILE BOTTOM NAV ===== */
        #bottomNav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 64px;
            z-index: 100;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
        }
        .dark #bottomNav { background: #0f172a; border-color: #1e293b; }
        .bnav-btn {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2px; border: none; background: none;
            color: #94a3b8; font-size: 22px;
            cursor: pointer; padding: 6px 12px;
            transition: color 0.2s;
        }
        .dark .bnav-btn { color: #64748b; }
        .bnav-btn span {
            font-size: 10px; font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .bnav-btn.active { color: #7c3aed; }
        .dark .bnav-btn.active { color: #a78bfa; }

        /* ===== MOBILE DETAIL OVERLAY ===== */
        .mobile-detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 90;
            background: #ffffff;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 80px;
        }
        .dark .mobile-detail-overlay { background: #0f172a; }
        .mobile-detail-overlay.open { display: block; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #sidebar { display: none !important; }
            #bottomNav { display: flex !important; }

            .landing-brand { display: none; }
            .landing-search { padding: 24px 20px; }

            .results-header { padding: 12px 16px; }
            .result-row { padding: 12px 16px; }
            .results-count { padding: 0 16px 8px; }

            .results-list.has-detail { max-width: none; border-right: none; }
            .detail-panel { display: none !important; }

            .search-bar { padding: 12px 16px; }
            .search-bar input { font-size: 16px; }

            .app-footer { display: none; }

            #mainContent { padding-bottom: 64px; }
        }

        @media (min-width: 769px) {
            .mobile-detail-overlay { display: none !important; }
        }

        /* ===== DARK OVERRIDES ===== */
        .dark #sidebar { background: #0f172a; }
        .light-sidebar { background: #1e293b; }
        .dark #mainContent { background: #0f172a; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 selection:bg-brand-600 selection:text-white transition-colors duration-300">

    <!-- ===== APP SHELL ===== -->
    <div id="app">

        <!-- ===== SIDEBAR ===== -->
        <nav id="sidebar" class="bg-sidebar-light dark:bg-sidebar-dark">
            <img src="assets/LOGO.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'">
            <div class="sidebar-divider"></div>

            <button class="sidebar-btn active" data-view="landing" title="Home" id="navHome">
                <i class="ph ph-house-simple"></i>
            </button>
            <button class="sidebar-btn" data-view="results" title="Search" id="navSearch">
                <i class="ph ph-magnifying-glass"></i>
            </button>
            <button class="sidebar-btn" data-view="bookmarks" title="Bookmarks" id="navBookmarks">
                <i class="ph ph-bookmarks-simple"></i>
            </button>

            <div class="sidebar-spacer"></div>
            <div class="sidebar-divider"></div>

            <button class="sidebar-btn" id="themeToggle" title="Toggle theme">
                <i class="ph ph-sun-dim theme-icon-light"></i>
                <i class="ph ph-moon theme-icon-dark" style="display:none"></i>
            </button>

            <a href="https://github.com/InanXR/ProjectShobdo" target="_blank" class="sidebar-btn" title="GitHub">
                <i class="ph ph-github-logo"></i>
            </a>
        </nav>

        <!-- ===== MAIN CONTENT ===== -->
        <div id="mainContent" class="bg-slate-50 dark:bg-slate-900">

            <!-- ====== LANDING VIEW ====== -->
            <div id="landingView">
                <!-- Left Brand Panel -->
                <div class="landing-brand">
                    <div class="orb orb-1"></div>
                    <div class="orb orb-2"></div>

                    <img src="assets/LOGO.png" alt="ProjectShobdo" style="width:120px;height:120px;object-fit:contain;margin-bottom:32px;filter:brightness(1.1)" onerror="this.style.display='none'">

                    <h1 style="font-size:32px;font-weight:700;color:#fff;margin:0 0 6px;">ProjectShobdo</h1>
                    <p style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.15em;margin:0 0 40px;font-family:'Inter',sans-serif">Open Bengali Dictionary</p>

                    <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:240px">
                        <div class="stat-chip"><i class="ph ph-book-open-text"></i> <span id="wordCountStat">Loading...</span></div>
                        <div class="stat-chip"><i class="ph ph-code"></i> Open Source</div>
                        <div class="stat-chip"><i class="ph ph-scales"></i> Apache 2.0</div>
                    </div>
                </div>

                <!-- Right Search Panel -->
                <div class="landing-search">
                    <div style="text-align:center;margin-bottom:40px">
                        <h2 style="font-size:28px;font-weight:700;color:#0f172a;margin:0 0 8px" class="dark:!text-slate-100">শব্দের জগতে স্বাগতম</h2>
                        <p style="font-size:15px;color:#94a3b8;margin:0;font-family:'Inter',sans-serif">Search across the entire Bengali lexical corpus</p>
                    </div>

                    <div class="search-container">
                        <div class="search-bar" id="landingSearchBar">
                            <i class="ph ph-magnifying-glass search-icon"></i>
                            <input type="text" id="landingSearchInput" placeholder="শব্দ খুঁজুন..." disabled>
                            <div id="landingSpinner" class="animate-spin" style="color:#7c3aed;display:none"><i class="ph ph-spinner-gap" style="font-size:22px"></i></div>
                            <span class="search-kbd" id="landingKbd">/</span>
                        </div>
                    </div>

                    <div class="suggestion-pills" id="suggestionPills">
                        <!-- filled by JS -->
                    </div>
                </div>
            </div>

            <!-- ====== RESULTS VIEW ====== -->
            <div id="resultsView">
                <!-- Header with search bar -->
                <div class="results-header">
                    <button class="back-btn" id="backToLanding" title="Back to Home">
                        <i class="ph ph-arrow-left"></i>
                    </button>
                    <div class="search-container" style="max-width:none;flex:1">
                        <div class="search-bar" style="padding:10px 20px;border-radius:12px">
                            <i class="ph ph-magnifying-glass search-icon" style="font-size:18px"></i>
                            <input type="text" id="resultsSearchInput" placeholder="শব্দ খুঁজুন...">
                            <span class="search-kbd">/</span>
                        </div>
                    </div>
                </div>

                <!-- Results Count -->
                <div class="results-count" id="resultsCount"></div>

                <!-- Body: list + detail -->
                <div class="results-body">
                    <div class="results-list" id="resultsList">
                        <!-- rows injected by JS -->
                    </div>
                    <div class="detail-panel" id="detailPanel">
                        <!-- detail injected by JS -->
                    </div>
                </div>

                <!-- Footer -->
                <div class="app-footer">
                    <span>&copy; 2025 ProjectShobdo. Apache License 2.0</span>
                    <div style="display:flex;gap:16px">
                        <a href="https://github.com/InanXR/ProjectShobdo" target="_blank"><i class="ph ph-github-logo"></i> GitHub</a>
                        <a href="dist/json/dictionary.min.json"><i class="ph ph-database"></i> JSON Data</a>
                    </div>
                </div>
            </div>

            <!-- ====== BOOKMARKS VIEW ====== -->
            <div id="bookmarksView">
                <div class="results-header">
                    <button class="back-btn" id="backFromBookmarks" title="Back to Home">
                        <i class="ph ph-arrow-left"></i>
                    </button>
                    <h2 style="font-size:18px;font-weight:700;margin:0;color:#334155" class="dark:!text-slate-100">
                        <i class="ph ph-bookmarks-simple" style="color:#7c3aed;margin-right:8px"></i> Bookmarks
                    </h2>
                </div>
                <div class="results-count" id="bookmarksCount"></div>
                <div class="results-body">
                    <div class="results-list" id="bookmarksList"></div>
                    <div class="detail-panel" id="bookmarkDetailPanel"></div>
                </div>
                <div class="app-footer">
                    <span>&copy; 2025 ProjectShobdo. Apache License 2.0</span>
                    <div style="display:flex;gap:16px">
                        <a href="https://github.com/InanXR/ProjectShobdo" target="_blank"><i class="ph ph-github-logo"></i> GitHub</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MOBILE BOTTOM NAV ===== -->
    <nav id="bottomNav">
        <button class="bnav-btn active" data-view="landing"><i class="ph ph-house-simple"></i><span>Home</span></button>
        <button class="bnav-btn" data-view="results"><i class="ph ph-magnifying-glass"></i><span>Search</span></button>
        <button class="bnav-btn" data-view="bookmarks"><i class="ph ph-bookmarks-simple"></i><span>Saved</span></button>
        <button class="bnav-btn" data-view="theme" id="mobileThemeBtn"><i class="ph ph-sun-dim"></i><span>Theme</span></button>
    </nav>

    <!-- ===== MOBILE DETAIL OVERLAY ===== -->
    <div class="mobile-detail-overlay" id="mobileDetailOverlay">
        <button style="background:none;border:none;font-size:24px;color:#64748b;cursor:pointer;margin-bottom:16px" id="mobileDetailClose">
            <i class="ph ph-arrow-left"></i>
        </button>
        <div id="mobileDetailContent"></div>
    </div>

    <script>
    (function() {
        // ===== STATE =====
        let currentView = 'landing'; // landing | results | bookmarks
        let dictionary = [];
        let currentResults = [];
        let selectedEntry = null;
        let selectedIndex = -1;
        let bookmarks = JSON.parse(localStorage.getItem('shobdo_bookmarks') || '[]');
        let debounceTimer = null;

        // ===== DOM REFS =====
        const html = document.documentElement;
        const views = { landing: document.getElementById('landingView'), results: document.getElementById('resultsView'), bookmarks: document.getElementById('bookmarksView') };
        const landingSearchInput = document.getElementById('landingSearchInput');
        const resultsSearchInput = document.getElementById('resultsSearchInput');
        const resultsList = document.getElementById('resultsList');
        const detailPanel = document.getElementById('detailPanel');
        const bookmarksList = document.getElementById('bookmarksList');
        const bookmarkDetailPanel = document.getElementById('bookmarkDetailPanel');
        const landingSpinner = document.getElementById('landingSpinner');
        const landingKbd = document.getElementById('landingKbd');
        const resultsCount = document.getElementById('resultsCount');
        const bookmarksCount = document.getElementById('bookmarksCount');
        const suggestionPills = document.getElementById('suggestionPills');
        const mobileOverlay = document.getElementById('mobileDetailOverlay');
        const mobileDetailContent = document.getElementById('mobileDetailContent');

        // ===== THEME =====
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
            updateThemeIcons();
        }
        function toggleTheme() {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            updateThemeIcons();
        }
        function updateThemeIcons() {
            const isDark = html.classList.contains('dark');
            document.querySelectorAll('.theme-icon-light').forEach(el => el.style.display = isDark ? 'none' : '');
            document.querySelectorAll('.theme-icon-dark').forEach(el => el.style.display = isDark ? '' : 'none');
            const mBtn = document.getElementById('mobileThemeBtn');
            if (mBtn) {
                mBtn.querySelector('i').className = isDark ? 'ph ph-moon' : 'ph ph-sun-dim';
            }
        }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('mobileThemeBtn').addEventListener('click', toggleTheme);
        initTheme();

        // ===== VIEW MANAGEMENT =====
        function switchView(view) {
            currentView = view;
            Object.keys(views).forEach(k => { views[k].style.display = k === view ? 'flex' : 'none'; });

            // Sidebar active state
            document.querySelectorAll('.sidebar-btn[data-view]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            // Bottom nav active state
            document.querySelectorAll('.bnav-btn[data-view]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });

            if (view === 'results') {
                resultsSearchInput.focus();
                if (currentResults.length === 0 && !resultsSearchInput.value.trim()) {
                    showRandomResults();
                }
            }
            if (view === 'bookmarks') {
                renderBookmarks();
            }
            if (view === 'landing') {
                closeDetailPanel();
                selectedEntry = null;
                selectedIndex = -1;
            }
        }

        // Sidebar nav
        document.querySelectorAll('.sidebar-btn[data-view]').forEach(btn => {
            btn.addEventListener('click', () => switchView(btn.dataset.view));
        });
        // Bottom nav
        document.querySelectorAll('.bnav-btn[data-view]').forEach(btn => {
            if (btn.dataset.view !== 'theme') {
                btn.addEventListener('click', () => switchView(btn.dataset.view));
            }
        });
        document.getElementById('backToLanding').addEventListener('click', () => switchView('landing'));
        document.getElementById('backFromBookmarks').addEventListener('click', () => switchView('landing'));

        // ===== LOAD DICTIONARY =====
        landingSpinner.style.display = 'block';
        landingKbd.style.display = 'none';

        fetch('dist/json/dictionary.min.json')
            .then(r => r.json())
            .then(data => {
                dictionary = data;
                landingSpinner.style.display = 'none';
                landingKbd.style.display = '';
                landingSearchInput.disabled = false;
                document.getElementById('wordCountStat').textContent = dictionary.length.toLocaleString('bn-BD') + ' শব্দ';
                populateSuggestions();
            })
            .catch(err => {
                console.error(err);
                landingSpinner.style.display = 'none';
                landingSearchInput.placeholder = 'Error loading data';
            });

        // ===== SUGGESTION PILLS =====
        function populateSuggestions() {
            if (dictionary.length === 0) return;
            const picks = [];
            const used = new Set();
            while (picks.length < 6 && picks.length < dictionary.length) {
                const idx = Math.floor(Math.random() * dictionary.length);
                if (!used.has(idx)) {
                    used.add(idx);
                    picks.push(dictionary[idx]);
                }
            }
            suggestionPills.innerHTML = picks.map(e =>
                `<button class="pill" data-word="${e.word}">${e.word}</button>`
            ).join('');
            suggestionPills.querySelectorAll('.pill').forEach(btn => {
                btn.addEventListener('click', () => {
                    resultsSearchInput.value = btn.dataset.word;
                    switchView('results');
                    performSearch(btn.dataset.word);
                });
            });
        }

        // ===== SEARCH LOGIC =====
        function performSearch(query) {
            query = query.trim().toLowerCase();
            if (!query) { showRandomResults(); return; }

            currentResults = dictionary.filter(entry => {
                const w = entry.word.toLowerCase();
                const eng = (entry.english_translation || '').toLowerCase();
                return w.includes(query) || eng.includes(query);
            }).slice(0, 60);

            renderResultsList(currentResults);
        }

        function showRandomResults() {
            if (dictionary.length === 0) return;
            const random = [];
            const used = new Set();
            while (random.length < 15 && random.length < dictionary.length) {
                const idx = Math.floor(Math.random() * dictionary.length);
                if (!used.has(idx)) { used.add(idx); random.push(dictionary[idx]); }
            }
            currentResults = random;
            renderResultsList(random, true);
        }

        // Landing search → switch to results
        landingSearchInput.addEventListener('input', (e) => {
            const q = e.target.value.trim();
            if (q.length >= 1) {
                resultsSearchInput.value = q;
                switchView('results');
                performSearch(q);
                landingSearchInput.value = '';
            }
        });

        // Results search → debounced
        resultsSearchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => performSearch(e.target.value), 250);
        });

        // ===== RENDER RESULTS LIST =====
        function renderResultsList(entries, isRandom) {
            closeDetailPanel();
            selectedEntry = null;
            selectedIndex = -1;

            if (entries.length === 0) {
                resultsCount.textContent = '';
                resultsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="ph ph-magnifying-glass"></i></div>
                        <h3>কোনো ফলাফল পাওয়া যায়নি</h3>
                        <p>No results found. Try a different search term.</p>
                    </div>
                `;
                return;
            }

            resultsCount.textContent = isRandom ? 'Showing random words — start typing to search' : `${entries.length} result${entries.length !== 1 ? 's' : ''} found`;

            resultsList.innerHTML = entries.map((entry, i) => `
                <div class="result-row animate-fade-up" data-index="${i}" style="animation-delay:${i * 30}ms;opacity:0">
                    <span class="rr-word">${entry.word}</span>
                    <span class="rr-pos">${entry.part_of_speech}</span>
                    <span class="rr-meaning">${entry.meanings[0] || ''}</span>
                    <i class="ph ph-caret-right rr-arrow"></i>
                </div>
            `).join('');

            resultsList.querySelectorAll('.result-row').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = parseInt(row.dataset.index);
                    selectEntry(idx, entries);
                });
            });
        }

        // ===== SELECT ENTRY / DETAIL PANEL =====
        function selectEntry(idx, entries) {
            entries = entries || currentResults;
            if (idx < 0 || idx >= entries.length) return;
            selectedIndex = idx;
            selectedEntry = entries[idx];

            // Highlight active row
            resultsList.querySelectorAll('.result-row').forEach((r, i) => {
                r.classList.toggle('active', i === idx);
            });

            const isMobile = window.innerWidth <= 768;
            const html = buildDetailHTML(selectedEntry);

            if (isMobile) {
                mobileDetailContent.innerHTML = html;
                mobileOverlay.classList.add('open');
            } else {
                detailPanel.innerHTML = html;
                detailPanel.classList.add('open');
                resultsList.classList.add('has-detail');
                detailPanel.classList.add('animate-slide-in-right');
            }

            // Bookmark button listener
            const bkmBtn = (isMobile ? mobileDetailContent : detailPanel).querySelector('.bookmark-btn');
            if (bkmBtn) {
                bkmBtn.addEventListener('click', () => toggleBookmark(selectedEntry, bkmBtn));
            }

            // Related word pills
            (isMobile ? mobileDetailContent : detailPanel).querySelectorAll('.related-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    resultsSearchInput.value = pill.dataset.word;
                    if (isMobile) mobileOverlay.classList.remove('open');
                    performSearch(pill.dataset.word);
                });
            });
        }

        function closeDetailPanel() {
            detailPanel.classList.remove('open');
            resultsList.classList.remove('has-detail');
            mobileOverlay.classList.remove('open');
        }

        document.getElementById('mobileDetailClose').addEventListener('click', closeDetailPanel);

        function buildDetailHTML(entry) {
            const isBookmarked = bookmarks.some(b => b.word === entry.word);
            const bookmarkClass = isBookmarked ? 'bookmarked' : '';

            // Find related words (same POS, different word)
            const related = dictionary.filter(e => e.part_of_speech === entry.part_of_speech && e.word !== entry.word)
                .sort(() => 0.5 - Math.random()).slice(0, 6);

            return `
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px">
                    <div class="detail-word">${entry.word}</div>
                    <button class="bookmark-btn ${bookmarkClass}" title="Bookmark">
                        <i class="ph${isBookmarked ? '-fill' : ''} ph-bookmark-simple"></i>
                    </button>
                </div>
                <div class="detail-pos"><i class="ph ph-tag-simple"></i> ${entry.part_of_speech}</div>

                <div class="detail-divider"></div>

                <div class="detail-section-title"><i class="ph ph-list-bullets"></i> অর্থ (Meanings)</div>
                <div style="margin-bottom:24px">
                    ${entry.meanings.map((m, i) => `
                        <div class="meaning-item">
                            <span class="meaning-num">${i + 1}</span>
                            <span>${m}</span>
                        </div>
                    `).join('')}
                </div>

                ${entry.english_translation ? `
                    <div class="detail-section-title"><i class="ph ph-translate"></i> English Translation</div>
                    <p class="detail-english">${entry.english_translation}</p>
                    <div class="detail-divider"></div>
                ` : '<div class="detail-divider"></div>'}

                ${entry.examples && entry.examples.length > 0 ? `
                    <div class="detail-section-title"><i class="ph ph-quotes"></i> উদাহরণ (Examples)</div>
                    ${entry.examples.map(ex => `
                        <div class="detail-example-box">
                            <span class="quote-mark">"</span>
                            <p>${ex}</p>
                        </div>
                    `).join('')}
                    <div class="detail-divider"></div>
                ` : ''}

                ${related.length > 0 ? `
                    <div class="detail-section-title"><i class="ph ph-link-simple"></i> সম্পর্কিত শব্দ (Related)</div>
                    <div class="related-pills">
                        ${related.map(r => `<button class="related-pill" data-word="${r.word}">${r.word}</button>`).join('')}
                    </div>
                ` : ''}
            `;
        }

        // ===== BOOKMARKS =====
        function toggleBookmark(entry, btn) {
            const idx = bookmarks.findIndex(b => b.word === entry.word);
            if (idx >= 0) {
                bookmarks.splice(idx, 1);
                btn.classList.remove('bookmarked');
                btn.innerHTML = '<i class="ph ph-bookmark-simple"></i>';
            } else {
                bookmarks.push(entry);
                btn.classList.add('bookmarked');
                btn.innerHTML = '<i class="ph-fill ph-bookmark-simple"></i>';
            }
            localStorage.setItem('shobdo_bookmarks', JSON.stringify(bookmarks));
        }

        function renderBookmarks() {
            bookmarksCount.textContent = bookmarks.length > 0 ? `${bookmarks.length} saved word${bookmarks.length !== 1 ? 's' : ''}` : '';

            if (bookmarks.length === 0) {
                bookmarksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="ph ph-bookmarks-simple"></i></div>
                        <h3>কোনো সংরক্ষিত শব্দ নেই</h3>
                        <p>No bookmarks yet. Search for a word and tap the bookmark icon to save it.</p>
                    </div>
                `;
                bookmarkDetailPanel.classList.remove('open');
                bookmarksList.classList.remove('has-detail');
                return;
            }

            bookmarksList.innerHTML = bookmarks.map((entry, i) => `
                <div class="result-row animate-fade-up" data-bk-index="${i}" style="animation-delay:${i * 30}ms;opacity:0">
                    <span class="rr-word">${entry.word}</span>
                    <span class="rr-pos">${entry.part_of_speech}</span>
                    <span class="rr-meaning">${entry.meanings[0] || ''}</span>
                    <i class="ph ph-caret-right rr-arrow"></i>
                </div>
            `).join('');

            bookmarksList.querySelectorAll('.result-row').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = parseInt(row.dataset.bkIndex);
                    selectBookmarkEntry(idx);
                });
            });
        }

        function selectBookmarkEntry(idx) {
            if (idx < 0 || idx >= bookmarks.length) return;
            const entry = bookmarks[idx];

            bookmarksList.querySelectorAll('.result-row').forEach((r, i) => r.classList.toggle('active', i === idx));

            const isMobile = window.innerWidth <= 768;
            const html = buildDetailHTML(entry);

            if (isMobile) {
                mobileDetailContent.innerHTML = html;
                mobileOverlay.classList.add('open');
            } else {
                bookmarkDetailPanel.innerHTML = html;
                bookmarkDetailPanel.classList.add('open');
                bookmarksList.classList.add('has-detail');
            }

            const bkmBtn = (isMobile ? mobileDetailContent : bookmarkDetailPanel).querySelector('.bookmark-btn');
            if (bkmBtn) {
                bkmBtn.addEventListener('click', () => {
                    toggleBookmark(entry, bkmBtn);
                    renderBookmarks();
                });
            }
        }

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            // "/" to focus search
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                if (currentView === 'landing') {
                    landingSearchInput.focus();
                } else if (currentView === 'results') {
                    resultsSearchInput.focus();
                }
            }

            // Escape to close detail or go back
            if (e.key === 'Escape') {
                if (mobileOverlay.classList.contains('open')) {
                    closeDetailPanel();
                } else if (detailPanel.classList.contains('open') || bookmarkDetailPanel.classList.contains('open')) {
                    closeDetailPanel();
                    bookmarkDetailPanel.classList.remove('open');
                    bookmarksList.classList.remove('has-detail');
                } else if (currentView !== 'landing') {
                    switchView('landing');
                }
            }

            // Arrow keys to navigate results
            if (currentView === 'results' && document.activeElement.tagName !== 'INPUT') {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (selectedIndex < currentResults.length - 1) {
                        selectEntry(selectedIndex + 1);
                        scrollRowIntoView(selectedIndex);
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (selectedIndex > 0) {
                        selectEntry(selectedIndex - 1);
                        scrollRowIntoView(selectedIndex);
                    }
                }
            }

            // Enter on search to select first result
            if (e.key === 'Enter' && (document.activeElement === resultsSearchInput || document.activeElement === landingSearchInput)) {
                if (currentView === 'results' && currentResults.length > 0) {
                    resultsSearchInput.blur();
                    selectEntry(0);
                }
            }
        });

        function scrollRowIntoView(idx) {
            const rows = resultsList.querySelectorAll('.result-row');
            if (rows[idx]) rows[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        // ===== INIT =====
        switchView('landing');
    })();
    </script>
</body>
</html>
